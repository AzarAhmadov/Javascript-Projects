<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Counter </title>
    <!-- Css file -->
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <!-- Counter start -->
    <div class="counter">
        <h1> Counter </h1>
        <span class="counter-value"> 0 </span>
        <div class="btn">
            <button class="dec-btn"> INCREASE </button>
            <button class="inc-btn"> DECREASE </button>
        </div>
    </div>
    <!-- Counter end -->

    <!-- Js file -->
    <script src="assets/index.js"></script>
</body>

</html>
