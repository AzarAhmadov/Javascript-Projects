<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Custom Slide </title>
    <!-- Css file -->
    <link rel="stylesheet" href="assets/index.css">
</head>

<body>

    <!-- Slide start -->
    <div class="slide">
        <div class="slide-container">
            <div class="slide-row">
                <div class="slide-item">
                    <div class="list-img active">
                        <img class="images"
                            src="https://images.pexels.com/photos/2422286/pexels-photo-2422286.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
                            alt="">
                    </div>
                    <div class="list-img">
                        <img class="images"
                            src="https://images.pexels.com/photos/3771789/pexels-photo-3771789.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
                            alt="">
                    </div>
                    <div class="list-img">
                        <img class="images"
                            src="https://images.pexels.com/photos/5614114/pexels-photo-5614114.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
                            alt="">
                    </div>
                    <div class="list-img">
                        <img class="images"
                            src="https://images.pexels.com/photos/3762806/pexels-photo-3762806.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
                            alt="">
                    </div>
                    <div class="list-img">
                        <img class="images"
                            src="https://images.pexels.com/photos/4340038/pexels-photo-4340038.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
                            alt="">
                    </div>
                    <div class="slide-btn">
                        <button class="prev"> Prev </button>
                        <button class="next"> Next </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Slide End -->

    <!-- Js file -->
    <script src="assets/index.js"></script>
</body>

</html>
